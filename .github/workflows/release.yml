name: Release

# Tag a release (e.g. `git tag v0.1.0 && git push --tags`) to build binaries,
# generate checksums, and attach everything to the GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Generate shell completions and the man page once (arch-independent) so every
  # platform archive can bundle them.
  assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build rewind
        run: cargo build --release --locked
      - name: Generate completions and man page
        run: |
          mkdir -p dist/assets/completions
          BIN=target/release/rewind
          for sh in bash zsh fish powershell elvish; do
            "$BIN" completions "$sh" > "dist/assets/completions/rewind.$sh"
          done
          "$BIN" man > dist/assets/rewind.1
      - uses: actions/upload-artifact@v4
        with:
          name: assets
          path: dist/assets

  build:
    needs: assets
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up cross toolchain (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Download assets
        uses: actions/download-artifact@v4
        with:
          name: assets
          path: dist/assets

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          NAME="rewind-${VERSION}-${{ matrix.target }}"
          STAGE="dist/${NAME}"
          mkdir -p "$STAGE/completions"
          cp "target/${{ matrix.target }}/release/rewind" "$STAGE/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$STAGE/"
          cp dist/assets/rewind.1 "$STAGE/"
          cp dist/assets/completions/* "$STAGE/completions/"
          tar -C dist -czf "${NAME}.tar.gz" "${NAME}"
          shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          echo "ASSET=${NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          fail_on_unmatched_files: true
