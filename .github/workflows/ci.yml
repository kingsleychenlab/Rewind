name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Configure Git (needed by integration tests)
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git config --global init.defaultBranch main

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --all-targets --locked

      - name: Test
        run: cargo test --locked

  # Dogfood: run `rewind ci` on this repository and upload the report.
  rewind-ci:
    name: rewind ci (self-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Configure Git
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
      - name: Install rewind
        run: cargo install --path . --locked
      - name: Run rewind ci
        run: rewind ci -- cargo test --locked
      - name: Upload Rewind report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rewind-report
          path: .rewind-report/
